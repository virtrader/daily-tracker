<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Daily Tracker</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Date Navigation -->
  <header id="date-nav">
    <button id="prev-day">&larr;</button>
    <h2 id="current-date"></h2>
    <button id="next-day">&rarr;</button>
  </header>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Tab: Today -->
  <section id="tab-today" class="tab-content active">
    <div id="summary-card" class="card">
      <div class="summary-line">
        <span id="sum-cal">0 kcal</span>
        <span id="sum-prot">0g protein</span>
        <span id="sum-habits">0/10</span>
      </div>
    </div>

    <div class="card">
      <h3>Quick Add Food</h3>
      <form id="quick-add-form">
        <select id="qa-meal">
          <option value="Breakfast">Breakfast</option>
          <option value="Lunch">Lunch</option>
          <option value="Dinner">Dinner</option>
          <option value="Snacks">Snacks</option>
        </select>
        <input type="text" id="qa-item" placeholder="Food item" required>
        <div class="row">
          <input type="number" id="qa-cal" placeholder="kcal" required>
          <input type="number" id="qa-prot" placeholder="protein (g)" required>
        </div>
        <button type="submit">Add</button>
      </form>
    </div>

    <div class="card">
      <h3>Habits</h3>
      <div id="habit-grid"></div>
    </div>

    <div class="export-buttons">
      <button id="export-day" class="btn-export">Export Today for Claude</button>
      <button id="export-week" class="btn-export btn-secondary">Export Week</button>
    </div>
  </section>

  <!-- Tab: Food -->
  <section id="tab-food" class="tab-content">
    <div class="card">
      <h3>Add Food</h3>
      <form id="food-form">
        <select id="f-meal">
          <option value="Breakfast">Breakfast</option>
          <option value="Lunch">Lunch</option>
          <option value="Dinner">Dinner</option>
          <option value="Snacks">Snacks</option>
        </select>
        <input type="text" id="f-item" placeholder="Food item" required>
        <div class="row">
          <input type="number" id="f-cal" placeholder="kcal" required>
          <input type="number" id="f-prot" placeholder="protein (g)" required>
        </div>
        <button type="submit">Add</button>
      </form>
    </div>
    <div id="food-list"></div>
  </section>

  <!-- Tab: Habits -->
  <section id="tab-habits" class="tab-content">
    <div class="card">
      <div id="habits-progress">0/10</div>
      <div id="habits-list"></div>
    </div>
  </section>

  <!-- Tab: Review -->
  <section id="tab-review" class="tab-content">
    <div class="toggle-row">
      <button class="toggle-btn active" data-range="week">Week</button>
      <button class="toggle-btn" data-range="month">Month</button>
    </div>
    <div class="card">
      <h3>Calories</h3>
      <div id="chart-calories" class="chart"></div>
    </div>
    <div class="card">
      <h3>Protein (g)</h3>
      <div id="chart-protein" class="chart"></div>
    </div>
    <div class="card">
      <h3>Habits</h3>
      <div id="chart-habits" class="chart"></div>
    </div>
  </section>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="today">
      <span class="nav-icon">&#9737;</span>
      <span>Today</span>
    </button>
    <button class="nav-btn" data-tab="food">
      <span class="nav-icon">&#9733;</span>
      <span>Food</span>
    </button>
    <button class="nav-btn" data-tab="habits">
      <span class="nav-icon">&#10003;</span>
      <span>Habits</span>
    </button>
    <button class="nav-btn" data-tab="review">
      <span class="nav-icon">&#9776;</span>
      <span>Review</span>
    </button>
  </nav>

  <script src="/js/app.js"></script>
  <script src="/js/food.js"></script>
  <script src="/js/habits.js"></script>
  <script src="/js/review.js"></script>
  <script src="/js/export.js"></script>
</body>
</html>
